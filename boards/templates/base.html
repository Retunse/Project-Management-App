<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trello Clone{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <nav class="bg-blue-600 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center text-white">
            <a href="{% url 'board_list' %}" class="text-2xl font-bold tracking-tight">TrelloClone</a>
            <div class="flex items-center space-x-4">
                {% if user.is_authenticated %}
                    <span class="text-sm opacity-90">Hello, <strong>{{ user.username }}</strong></span>
                    <form method="POST" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="bg-blue-700 hover:bg-blue-800 px-4 py-2 rounded text-sm transition">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="text-white font-semibold hover:underline mr-4">Login</a>
                    <a href="{% url 'signup' %}" class="bg-white text-blue-600 font-bold px-4 py-2 rounded-lg shadow hover:bg-gray-100 transition">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 px-4">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
