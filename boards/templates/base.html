<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trello Clone{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <nav class="bg-blue-600 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center text-white">
            <a href="{% url 'board_list' %}" class="text-2xl font-bold tracking-tight">TrelloClone</a>
            <div>
                <span class="mr-4 text-sm opacity-90">Logged in as: <strong>{{ user.username }}</strong></span>
                <a href="/admin" class="bg-blue-700 hover:bg-blue-800 px-4 py-2 rounded transition">Admin Panel</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 px-4">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
