<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trello Clone{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal flex flex-col min-h-screen">

    <nav class="bg-blue-600 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center text-white">
            <a href="{% url 'board_list' %}" class="text-2xl font-bold tracking-tight">TrelloClone</a>
            <div class="flex items-center space-x-4">
                {% if user.is_authenticated %}
                    <span class="text-sm opacity-90">Hello, <strong>{{ user.username }}</strong></span>
                    <form method="POST" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="bg-blue-700 hover:bg-blue-800 px-4 py-2 rounded text-sm transition">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="text-white font-semibold hover:underline mr-4">Login</a>
                    <a href="{% url 'signup' %}" class="bg-white text-blue-600 font-bold px-4 py-2 rounded-lg shadow hover:bg-gray-100 transition">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 px-4 flex-grow">
        {% block content %}
        {% endblock %}

    </main>
    <footer class="bg-white border-t border-gray-200 mt-auto">
    <div class="max-w-[1800px] mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">

        <div class="flex items-center space-x-2">
            <span class="text-blue-600 font-black text-lg tracking-tighter">TrelloClone</span>
            <span class="text-gray-400 text-xs font-medium">© 2026 Build with Django</span>
        </div>

        <div class="flex items-center space-x-6 text-xs font-bold text-gray-500 uppercase tracking-widest">
            <div class="flex items-center space-x-1.5">
                <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span>
            </div>
            <a href="https://github.com/Retunse/Project-Management-App" class="hover:text-blue-600 transition">GitHub</a>
        </div>

    </div>
</footer>


</body>
</html>
