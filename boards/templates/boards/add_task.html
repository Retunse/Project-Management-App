{% extends 'base.html' %}

{% block title %}Add New Task | Trello Clone{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white p-8 rounded-xl shadow-lg mt-10">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">Add task to: {{ target_list.title }}</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="flex justify-between mt-6">
            <a href="{% url 'board_detail' target_list.board.slug %}" class="text-gray-500 hover:text-gray-700 font-medium py-2">Cancel</a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition">
                Save Task
            </button>
        </div>
    </form>
</div>
{% endblock %}
