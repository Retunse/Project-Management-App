{% extends 'base.html' %}

{% block title %}Create New Board | Trello Clone{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl border border-gray-100 mt-12">
    <h1 class="text-2xl font-black text-gray-800 mb-6">Create new board</h1>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-6">
            <label class="block text-sm font-bold text-gray-700 mb-2">Board Title</label>
            {{ form.title }}
        </div>

        <div class="flex items-center justify-end space-x-4">
            <a href="{% url 'board_list' %}" class="text-gray-400 hover:text-gray-600 font-semibold transition">Cancel</a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition transform hover:-translate-y-1">
                Create Board
            </button>
        </div>
    </form>
</div>
{% endblock %}
