{% extends 'base.html' %}

{% block title %}Edit Board | Trello Clone{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl mt-10">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Edit Board Title</h1>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-2">New Title</label>
            {{ form.title }}
        </div>

        <div class="flex justify-end space-x-4 mt-8">
            <a href="{% url 'board_list' %}" class="text-gray-500 hover:text-gray-700 py-2">Cancel</a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow transition">
                Save Changes
            </button>
        </div>
    </form>
</div>
{% endblock %}
