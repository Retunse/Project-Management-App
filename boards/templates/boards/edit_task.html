{% extends 'base.html' %}

{% block title %}Edit Task | Trello Clone{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white p-8 rounded-2xl shadow-xl mt-10">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Edit Task</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                {{ form.title }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                {{ form.description }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
                {{ form.priority }}
            </div>
        </div>

        <div class="flex justify-between items-center mt-10 border-t pt-6">
            <a href="{% url 'board_detail' task.list.board.slug %}" class="text-gray-500 hover:text-gray-700 font-medium">
                &larr; Back to Board
            </a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-8 rounded-lg shadow-md transition transform hover:-translate-y-0.5">
                Update Task
            </button>
        </div>
    </form>
</div>
{% endblock %}
