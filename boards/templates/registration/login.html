{% extends 'base.html' %}

{% block title %}Login | Trello Clone{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl mt-12 border border-gray-100">
    <h1 class="text-2xl font-black text-gray-800 mb-6 text-center">Login to TrelloClone</h1>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-sm font-bold text-gray-700 mb-2">Username</label>
            <input type="text" name="username" class="w-full p-3 border-2 border-gray-200 rounded-lg outline-none focus:border-blue-500 transition">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
            <input type="password" name="password" class="w-full p-3 border-2 border-gray-200 rounded-lg outline-none focus:border-blue-500 transition">
        </div>

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition transform hover:-translate-y-1">
            Sign In
        </button>
    </form>
</div>
{% endblock %}
